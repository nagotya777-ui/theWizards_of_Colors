<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>キャラクター紹介</title>
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <div class="container">
        <!-- Color Selection Screen -->
        <div id="colorSelectionScreen" class="screen active">
            <header>
                <h1>いろのまほうつかい</h1>
                <p class="subtitle">-キャラクター紹介-</p>
            </header>
            
            <div class="gradient-wrapper">
                <button id="scrollLeft" class="scroll-arrow" aria-label="前へ"><</button>
                <div class="gradient-container">
                    <div id="gradientBar" class="gradient-bar"></div>
                    <div id="colorPointers" class="color-pointers"></div>
                </div>
                <button id="scrollRight" class="scroll-arrow" aria-label="次へ">></button>
            </div>
        </div>

        <!-- Area Color List Screen -->
        <div id="areaColorListScreen" class="screen">
            <div class="split-layout">
                <div id="areaColorBackground" class="color-background">
                    <div class="color-description">
                        <h2 id="areaName" class="color-name"></h2>
                        <p id="areaDescription" class="color-description-text"></p>
                    </div>
                    <div class="map-container" id="areaMapContainer">
                        <!-- SVG Map will be loaded here -->
                    </div>
                </div>
                
                <div class="color-list-container">
                    <button id="backToColorSelection" class="back-button">← 戻る</button>
                    <p>この地域を拠点とするまほうつかい達</p>
                    <div id="colorGrid" class="color-grid"></div>
                </div>
            </div>
        </div>

        <!-- Character List Screen -->
        <div id="characterListScreen" class="screen">
            <div class="split-layout">
                <div id="colorBackground" class="color-background">
                    <div class="color-description">
                         <small id="selectedColorEngName" class="color-eng-dis-name"></small>
                        <h2 id="selectedColorName" class="color-name"></h2>
                        <p id="colorDescription" class="color-description-text"></p>
                        <p id="territoryInfo" class="territory-info"></p>
                    </div>
                    <div class="map-container" id="mapContainer">
                        <!-- SVG Map will be loaded here -->
                    </div>
                </div>
                
                <div class="character-list-container">
                    <button id="backToColors" class="back-button">← いろの選択に戻る</button>
                    <div id="characterGrid" class="character-grid"></div>
                </div>
            </div>
        </div>&

        <!-- Character Profile Screen -->
        <div id="characterProfileScreen" class="screen">
            <div class="split-layout">
                <div id="profileColorBackground" class="color-background">
                    <div class="color-description">
                        <h2 id="profileColorName" class="color-name"></h2>
                        <p id="profileColorDescription" class="color-description-text"></p>
                    </div>
                </div>
                
                <div class="profile-container">
                    <button id="backToCharacters" class="back-button">← キャラクター一覧に戻る</button>
                    
                    <div class="profile-content">
                        <div class="profile-image-section">
                            <img id="characterFullImage" src="" alt="キャラクター立ち絵" class="character-full-image">
                            <div id="expressionVariations" class="expression-variations"></div>
                        </div>
                        
                        <div class="profile-info-section">
                            <h2 class="character-title">
                                <span id="characterName" class="character-name"></span>
                                <span id="characterEngName" class="character-eng-name"></span>
                            </h2>
                            
                            <div class="profile-section">
                                <h3>Profile</h3>
                                <div id="characterProfile" class="profile-details"></div>
                            </div>
                            
                            <div class="profile-section">
                                <h3>Ability</h3>
                                <div id="characterMagic" class="magic-details"></div>
                            </div>
                            
                            <div class="profile-section">
                                <h3>About</h3>
                                <div id="characterBio" class="bio-details"></div>
                            </div>
                            
                            <div id="relatedCharacters" class="related-characters">
                                <h3>関連キャラクター</h3>
                                <div id="relatedCharactersGrid" class="related-characters-grid"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Expression Modal -->
    <div id="expressionModal" class="expression-modal">
        <span class="expression-modal-close">&times;</span>
        <img id="expressionModalImage" src="" alt="表情差分" class="expression-modal-image">
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
