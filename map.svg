<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" id="territoryMapSVG">
  <defs>
    <style>
      .area-region {
        fill: #e0e0e0;
        stroke: #ffffff;
        stroke-width: 4;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .area-region:hover {
        opacity: 0.8;
      }
      .area-region.active {
        stroke-width: 6;
      }
      .area-region.inactive {
        opacity: 0.4;
      }
      .area-label {
        fill: #333333;
        font-family: 'UtukushiMincho', serif;
        font-size: 32px;
        font-weight: bold;
        text-anchor: middle;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </defs>

  <!-- 雪国 (Top right - Snow Country) -->
  <path id="area-雪国" class="area-region" data-area="雪国"
        d="M 620,170 L 750,140 L 880,180 L 920,260 L 900,340 L 820,380 L 720,360 L 650,300 L 620,220 Z"/>
  <text class="area-label" x="770" y="270">雪国</text>

  <!-- 農村 (Left upper - Farm Village) -->
  <path id="area-農村" class="area-region" data-area="農村"
        d="M 220,240 L 320,200 L 400,220 L 450,280 L 430,360 L 360,400 L 280,380 L 220,320 L 200,280 Z"/>
  <text class="area-label" x="320" y="300">農村</text>

  <!-- 山岳 (Top center - Mountains) -->
  <path id="area-山岳" class="area-region" data-area="山岳"
        d="M 450,180 L 560,140 L 650,160 L 680,220 L 660,300 L 580,340 L 500,320 L 450,260 L 440,220 Z"/>
  <text class="area-label" x="560" y="250">山岳</text>

  <!-- 中央 (Center - Central) -->
  <path id="area-中央" class="area-region" data-area="中央"
        d="M 430,360 L 500,320 L 580,340 L 620,400 L 600,480 L 540,520 L 460,520 L 400,480 L 390,420 Z"/>
  <text class="area-label" x="500" y="440">中央</text>

  <!-- 森林 (Right - Forest) -->
  <path id="area-森林" class="area-region" data-area="森林"
        d="M 720,360 L 820,380 L 900,420 L 940,500 L 920,600 L 840,660 L 740,640 L 680,580 L 660,500 L 680,420 Z"/>
  <text class="area-label" x="780" y="520">森林</text>

  <!-- 学術都市 (Left center - Academic City) -->
  <path id="area-学術都市" class="area-region" data-area="学術都市"
        d="M 220,420 L 300,380 L 380,400 L 420,460 L 400,540 L 340,580 L 260,560 L 200,500 L 190,460 Z"/>
  <text class="area-label" x="300" y="480">学術都市</text>

  <!-- 商業都市 (Bottom center left - Commercial City) -->
  <path id="area-商業都市" class="area-region" data-area="商業都市"
        d="M 340,580 L 420,560 L 480,580 L 520,640 L 500,720 L 440,760 L 360,740 L 300,680 L 290,620 Z"/>
  <text class="area-label" x="400" y="670">商業都市</text>

  <!-- 工業都市 (Bottom center right - Industrial City) -->
  <path id="area-工業都市" class="area-region" data-area="工業都市"
        d="M 520,580 L 600,560 L 680,580 L 740,640 L 720,720 L 660,760 L 580,740 L 520,680 L 510,620 Z"/>
  <text class="area-label" x="620" y="670">工業都市</text>

  <!-- 港町 (Bottom - Port Town) -->
  <path id="area-港町" class="area-region" data-area="港町"
        d="M 360,740 L 440,760 L 520,780 L 600,800 L 680,820 L 720,860 L 640,900 L 480,920 L 320,900 L 240,860 L 280,820 L 320,780 Z"/>
  <text class="area-label" x="480" y="850">港町</text>

</svg>

