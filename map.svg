<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
 width="3460.000000pt" height="3472.000000pt" viewBox="385 235 1010 1220"
 preserveAspectRatio="xMidYMid meet" id="territoryMapSVG">

<defs>
  <!-- Pattern Definitions -->
  <pattern id="pattern-city" patternUnits="userSpaceOnUse" width="100" height="100">
    <rect width="100" height="100" fill="none"/>
    <circle cx="25" cy="25" r="8" fill="rgba(0,0,0,0.15)"/>
    <circle cx="75" cy="25" r="8" fill="rgba(0,0,0,0.15)"/>
    <circle cx="25" cy="75" r="8" fill="rgba(0,0,0,0.15)"/>
    <circle cx="75" cy="75" r="8" fill="rgba(0,0,0,0.15)"/>
    <circle cx="50" cy="50" r="8" fill="rgba(0,0,0,0.15)"/>
  </pattern>
  
  <pattern id="pattern-port" patternUnits="userSpaceOnUse" width="120" height="40">
    <rect width="120" height="40" fill="none"/>
    <line x1="0" y1="10" x2="120" y2="10" stroke="rgba(0,0,0,0.2)" stroke-width="3"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="rgba(0,0,0,0.2)" stroke-width="3"/>
  </pattern>
  
  <pattern id="pattern-forest" patternUnits="userSpaceOnUse" width="60" height="60">
    <rect width="60" height="60" fill="none"/>
    <circle cx="10" cy="10" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="30" cy="15" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="50" cy="10" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="20" cy="30" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="40" cy="35" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="10" cy="50" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="30" cy="45" r="4" fill="rgba(0,0,0,0.25)"/>
    <circle cx="50" cy="50" r="4" fill="rgba(0,0,0,0.25)"/>
  </pattern>
  
  <pattern id="pattern-mountain" patternUnits="userSpaceOnUse" width="80" height="80">
    <rect width="80" height="80" fill="none"/>
    <path d="M0,60 L20,20 L40,60 Z" fill="rgba(0,0,0,0.15)"/>
    <path d="M40,60 L60,30 L80,60 Z" fill="rgba(0,0,0,0.15)"/>
  </pattern>
  
  <pattern id="pattern-farm" patternUnits="userSpaceOnUse" width="100" height="100">
    <rect width="100" height="100" fill="none"/>
    <line x1="0" y1="25" x2="100" y2="25" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  </pattern>
  
  <pattern id="pattern-snow" patternUnits="userSpaceOnUse" width="80" height="80">
    <rect width="80" height="80" fill="none"/>
    <path d="M40,10 L40,70 M10,40 L70,40 M20,20 L60,60 M60,20 L20,60" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </pattern>
  
  <pattern id="pattern-center" patternUnits="userSpaceOnUse" width="100" height="100">
    <rect width="100" height="100" fill="none"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="3"/>
    <circle cx="50" cy="50" r="15" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
  </pattern>

  <style>
    .area-region {
      fill: #464646;
      stroke: #ffffff;
      stroke-width: 25;
      transition: all 0.3s ease;
      transform-origin: center;
    }
    .area-region:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }
    .area-region.active {
      transform: scale(1.03);
    }
    .unnamed-area {
      fill: #262626;
      stroke-width: 15;
      opacity: 0.3;
      transition: all 0.3s ease;
    }
    .area-label {
      fill: #ffffff;
      font-family: 'UtukushiMincho', serif;
      font-size: 340px;
      font-weight: normal;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
      transition: all 0.3s ease;
      transform-origin: center;
    }
    .area-label.highlighted {
      font-size: 374px;
      font-weight: bold;
      transform: scale(1.03);
    }
    .area-label.hover-label {
      transform: scale(1.05);
    }
  </style>
</defs>

